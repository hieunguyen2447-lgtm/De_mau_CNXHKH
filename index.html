            "options": ["A. Vì giai cấp tư sản không muốn chia sẻ quyền lực của mình với các giai cấp tầng lớp khác.", "B. Vì dân chủ tư sản mới thực hiện quyền làm chủ cho một giai cấp riêng lẻ trong xã hội.", "C. Vì dân chủ tư sản được xây dựng trên nền tảng kinh tế là chế độ tư hữu về tư liệu sản xuất.", "D. Vì lực lượng sản xuất chưa thực sự phát triển, chưa mang tính xã hội hoá cao."]

            "options": ["A. Nền dân chủ chủ nô.", "B. Nền dân chủ phong kiến.", "C. Nền dân chủ nguyên thuỷ.", "D. Nền dân chủ xã hội chủ nghĩa."]

            "question": "Câu 10. Nói về gia đình hiện nay, có một câu nói rất hay: “Có một nơi để về, đó là nhà. Có những người để yêu thương, đó là gia đình. Có được cả hai, đó là hạnh phúc\". Câu nói trên đã khái quát và làm sáng tỏ nội dung nào dưới đây?",

        },

            "options": ["A. Cách mạng xã hội chủ nghĩa là một quá trình lịch sử, nên đương nhiên cách mạng vô sản có thể xảy ra cùng một lúc ở tất cả các nước văn minh, nhưng xảy ra và thắng lợi là hai khái niệm khác nhau; thắng lợi nhanh hay chậm, khó hay dễ thì lại khác nhau.", "B. Thời kỳ quá độ lên chủ nghĩa xã hội là tất yếu khách quan đối với nhân loại, tất yếu khách quan đối với những nước mà chính quyền đã thuộc về tay nhân dân dưới sự lãnh đạo đúng đắn của Đảng Mác-xít - Lê-nin-nit.", "C. Mô hình xây dựng chủ nghĩa xã hội ở một nước riêng lẻ có trình độ phát triển lạc hậu bỏ qua giai đoạn phát triển tư bản chủ nghĩa mà V.I. Lênin đặt nền móng ở nước Nga là một biểu hiện của “sự chệch hướng khỏi các nguyên lý mác-xít cơ bản”, hoàn toàn đối lập với nguyên lý của Mác.", "D. Trong điều kiện các nước tư bản đều phát triển, việc đưa ra nhận định cách mạng vô sản chỉ có thể xảy ra trước hết ở những nước tư bản phát triển, chứ không thể xảy ra ở nơi nào khác trên thế giới là hoàn toàn đúng cả về lý luận và thực tiễn."]

            "options": ["A. Nhấn mạnh vai trò lịch sử, cống hiến vĩ đại, giá trị khai sáng, tinh thần mở lối và xác lập một xu hướng phát triển, một “tuyến tiến hoá” mới cho cả nhân loại của V.I. Lênin - quá độ lên chủ nghĩa xã hội trên phạm vi toàn thế giới.", "B. Cống hiến vĩ đại của V.I. Lênin còn thể hiện ở thành quả bảo vệ thành công chủ nghĩa Mác - Lênin trước sự xuyên tạc, tấn công đa chiều trên nhiều phương diện, nhiều cấp độ, với đủ phương thức, âm mưu, thủ đoạn của những người có tư tưởng đối lập với chủ nghĩa Mác - Lênin.", "C. Từ Chính sách cộng sản thời chiến đến NEP, V.I. Lênin đã trở thành nhà cách tân vĩ đại đầu tiên trong lịch sử xây dựng chủ nghĩa xã hội, đồng thời để lại nhiều chỉ dẫn kinh điển quý báu cho công cuộc cải cách, đổi mới ở các nước xã hội chủ nghĩa hiện nay.", "D. V.I. Lênin không chỉ kế thừa trung thành học thuyết khoa học, cách mạng của chủ nghĩa Mác mà còn bổ sung, phát triển toàn diện học thuyết Mác lên tầm cao mới, chuyển lý luận thành thực tiễn cách mạng xã hội chủ nghĩa, làm cho chủ nghĩa Mác thực sự trở thành hệ tư tưởng thống trị trong phong trào cộng sản và công nhân quốc tế."]
        },
        {
            "question": "Câu 35. Phương án nào dưới đây KHÔNG đúng khi đánh giá về những biến đổi và khác biệt của giai cấp công nhân ở một số quốc gia xã hội chủ nghĩa hiện nay?",
            "options": ["A. Giai cấp công nhân có vai trò và đóng góp ngày càng ít hơn đối với sự phát triển của xã hội, không còn là giai cấp lãnh đạo cách mạng.", "B. Giai cấp công nhân ngày càng tăng nhanh về số lượng, thay đổi lớn về cơ cấu xã hội, nghề nghiệp và thu nhập trong nền sản xuất hiện đại.", "C. Đảng Cộng sản – đội tiên phong của giai cấp công nhân, giữ vai trò cầm quyền trong quá trình xây dựng chủ nghĩa xã hội.", "D. Giai cấp công nhân vẫn giữ vai trò lãnh đạo cách mạng trong tiến trình xây dựng chủ nghĩa xã hội, chủ nghĩa cộng sản."]
        }
    ];
   // Mảng đáp án 35 câu (Đã cập nhật theo bảng chuẩn)
    const answers = [
        1, 2, 0, 1, 0, 0, 2, 3, 3, 1, 
        1, 2, 3, 3, 1, 1, 1, 3, 1, 3, 
        0, 2, 2, 1, 0, 0, 2, 2, 1, 0, 
        0, 1, 1, 0, 0
    ];

// Tự động gộp đáp án vào dữ liệu câu hỏi
quizData.forEach((q, i) => q.answer = answers[i]);
    const quizElement = document.getElementById('quiz');
    const resultElement = document.getElementById('result');

    // Hàm render câu hỏi ra màn hình
    function loadQuiz() {
        quizData.forEach((q, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.classList.add('question');
            questionDiv.innerHTML = `<p>${q.question}</p>`;
            
            q.options.forEach((opt, optIndex) => {
                questionDiv.innerHTML += `
                    <label class="option">
                        <input type="radio" name="question${index}" value="${optIndex}">
                        ${opt}
                    </label>
                `;
            });
            quizElement.appendChild(questionDiv);
        });
    }

    // Hàm tính điểm và hiển thị câu đúng/sai
    function submitQuiz() {
        let score = 0;
        
        quizData.forEach((q, index) => {
            // Lấy danh sách tất cả thẻ input (A, B, C, D) của câu hỏi hiện tại
            const options = document.querySelectorAll(`input[name="question${index}"]`);
            
            options.forEach((radio, optIndex) => {
                // label chính là thẻ bao bọc chứa đoạn text đáp án
                const label = radio.parentElement;
                
                // Trả lại màu mặc định (để tránh lỗi nếu người dùng bấm nộp bài nhiều lần)
                label.style.color = '#333';
                label.style.fontWeight = 'normal';

                // Nếu là đáp án đúng -> Luôn bôi màu xanh lá
                if (optIndex === q.answer) {
                    label.style.color = '#27ae60';
                    label.style.fontWeight = 'bold';
                }
                
                // Nếu người dùng chọn sai -> Bôi màu đỏ đáp án đó
                if (radio.checked) {
                    if (optIndex === q.answer) {
                        score++; // Chọn đúng thì cộng điểm
                    } else {
                        label.style.color = '#e74c3c';
                        label.style.fontWeight = 'bold';
                        label.style.textDecoration = 'line-through'; // Gạch ngang câu sai
                    }
                }
            });
        });
        
        // Hiển thị tổng điểm
        resultElement.innerText = `Bạn đã trả lời đúng ${score} / ${quizData.length} câu!`;
    }
    // Chạy khi trang vừa tải xong
    loadQuiz();
</script>
